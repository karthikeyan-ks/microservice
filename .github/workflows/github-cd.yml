name: Deploy to GKE

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/myrepo/myapp:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/myrepo/myapp:${{ github.sha }}

      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials my-cluster \
            --region us-central1

      - name: Deploy
        run: |
          kubectl set image deployment/myapp \
            myapp=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/myrepo/myapp:${{ github.sha }}

          kubectl rollout status deployment/myapp