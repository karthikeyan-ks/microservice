name: Deploy to GKE

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: myapp
  REPOSITORY: myrepo
  REGION: us-central1
  CLUSTER_NAME: my-cluster
  DEPLOYMENT_NAME: myapp
  CONTAINER_NAME: myapp

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Spring Boot Application
        run: |
          chmod +x mvnw || true
          ./mvnw clean package -DskipTests

      - name: Verify JAR Exists
        run: |
          ls -lah target/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
            -t ${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPOSITORY}/${IMAGE_NAME}:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push \
            ${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPOSITORY}/${IMAGE_NAME}:${{ github.sha }}

      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials ${CLUSTER_NAME} \
            --region ${REGION}

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/${DEPLOYMENT_NAME} \
            ${CONTAINER_NAME}=${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPOSITORY}/${IMAGE_NAME}:${{ github.sha }}

          kubectl rollout status deployment/${DEPLOYMENT_NAME}